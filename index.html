<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ETF 分组风险分析仪表盘</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="data.js"></script>
  <script src="technical.js"></script>
  <script src="riskengine.js"></script>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">📈</span>
        <span class="logo-text">ETF 分组风险分析仪表盘</span>
      </div>
      <div class="header-meta">
        <span class="timestamp">数据更新: <strong id="dataTime"></strong></span>
        <span class="data-source">来源: <strong id="dataSource"></strong></span>
      </div>
    </div>
  </header>

  <!-- 双分析模式切换 -->
  <section class="mode-switch">
    <div class="mode-switch-inner">
      <span class="mode-label">分析模式：</span>
      <div class="mode-btns" id="modeBtns"></div>
      <span class="mode-desc" id="modeDesc"></span>
    </div>
  </section>

  <!-- 3个独立分组导航 -->
  <nav class="group-nav" id="groupNav"></nav>

  <!-- 分组视图(表格+风险标签+建议) -->
  <main id="groupView"></main>

  <!-- 数据架构(全局, 折叠) -->
  <section class="data-architecture" id="dataArchitecture"></section>

  <footer class="footer">
    <div class="footer-inner">
      <p class="disclaimer">⚠️ 声明：本网站仅为个人投资研究工具，所有分析基于公开市场数据，不构成任何投资建议。投资有风险，决策需谨慎。</p>
      <p class="footer-meta">数据来源: 腾讯自选股行情数据接口 + 综合分析模型 | 框架: 3分组 / 双模式 / 四级风险 / 固定阈值</p>
      <p class="footer-tech">纯HTML+JS静态网站 · 部署于 GitHub Pages · 数据架构 v3.0 · 交易日 09:31/11:31/13:31/16:00 自动刷新</p>
    </div>
  </footer>

  <!-- 单只深度分析弹层 -->
  <div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
    <div class="detail-modal">
      <button class="detail-close" onclick="closeDetail()">✕</button>
      <div id="etfDetail"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
